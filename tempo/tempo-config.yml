server:
  http_listen_port: 3200

# ── How Tempo receives traces ────────────────────────────
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

# ── How traces are processed ─────────────────────────────
ingester:
  max_block_duration: 5m

# ── Where traces are stored ──────────────────────────────
storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal

# ── How long traces are kept ─────────────────────────────
compactor:
  compaction:
    block_retention: 1h

# ── Trace search settings ────────────────────────────────
metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: docker-compose
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics