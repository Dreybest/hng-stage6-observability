global:
  resolve_timeout: 5m
  slack_api_url: "${SLACK_WEBHOOK_URL}"

# ── Alert routing ────────────────────────────────────────
route:
  group_by:
    - alertname
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: slack-alerts
  routes:
    - match:
        severity: critical
      receiver: slack-alerts
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: slack-alerts
      repeat_interval: 4h

# ── Receivers ────────────────────────────────────────────
receivers:
  - name: slack-alerts
    slack_configs:
      - channel: "#DevOps-Alerts"
        send_resolved: true
        icon_url: "https://avatars.githubusercontent.com/u/3380462"
        username: "Alertmanager"
        title: |-
          [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Severity:* {{ .Labels.severity }}
          *Host:* {{ .Labels.instance }}
          *Value:* {{ .Annotations.value }}
          *Description:* {{ .Annotations.description }}
          *Dashboard:* {{ .Annotations.dashboard_url }}
          *Runbook:* {{ .Annotations.runbook_url }}
          *Started:* {{ .StartsAt | since }}
          {{ end }}

# ── Inhibition rules ─────────────────────────────────────
inhibit_rules:
  # Suppress warnings when critical is already firing
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal:
      - alertname
      - instance

  # Suppress everything when host is completely down
  - source_match:
      alertname: ServerDown
    target_match_re:
      severity: warning|critical
    equal:
      - instance